services:
  photo-measure:
    image: kevin950805/onshape-measure:latest
    ports:
      - "8123:8123"
    volumes:
      - measure-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=8123
      - PYTHON_PATH=/usr/bin/python3
    restart: unless-stopped

volumes:
  measure-data:
