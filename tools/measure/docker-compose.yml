services:
  photo-measure:
    image: kevin950805/onshape-measure:latest
    ports:
      - "6123:6123"
    volumes:
      - measure-data:/app/data
    environment:
      - TZ=Asia/Taipei
      - NODE_ENV=production
      - PORT=6123
      - PYTHON_PATH=/opt/venv/bin/python3
    restart: unless-stopped

volumes:
  measure-data:
