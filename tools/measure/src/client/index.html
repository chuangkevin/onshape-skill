<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>照片量測工具</title>
  <script>
    // 清除舊的 Service Worker（避免快取衝突）
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
    }
    // 阻止瀏覽器預設拖曳行為（避免 about:blank#blocked）
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => e.preventDefault());
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft JhengHei", system-ui, sans-serif; background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .header { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: #161b22; border-bottom: 1px solid #30363d; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header .project-name { color: #58a6ff; font-size: 14px; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 240px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-section { padding: 12px; border-bottom: 1px solid #30363d; }
    .sidebar-section h3 { font-size: 12px; color: #8b949e; margin-bottom: 8px; letter-spacing: 0.5px; }
    .photo-list { display: flex; flex-direction: column; gap: 4px; }
    .photo-thumb { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .photo-thumb:hover { background: #21262d; }
    .photo-thumb.active { background: #1f6feb33; border: 1px solid #1f6feb; }
    .photo-thumb img { width: 40px; height: 30px; object-fit: cover; border-radius: 4px; }
    .toolbar { display: flex; gap: 4px; padding: 8px 12px; background: #161b22; border-bottom: 1px solid #30363d; flex-wrap: wrap; }
    .tool-btn { padding: 6px 12px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .tool-btn:hover { background: #30363d; }
    .tool-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
    .tool-sep { width: 1px; background: #30363d; margin: 0 4px; }
    .workspace { flex: 1; position: relative; overflow: hidden; }
    .workspace canvas { position: absolute; top: 0; left: 0; }
    #photoCanvas { z-index: 1; }
    #drawingCanvas { z-index: 2; cursor: crosshair; }
    .dropzone { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 10; }
    .dropzone.hidden { display: none; }
    .dropzone-box { border: 2px dashed #30363d; border-radius: 12px; padding: 48px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
    .dropzone-box:hover, .dropzone-box.dragover { border-color: #1f6feb; }
    .dropzone-box h2 { font-size: 18px; margin-bottom: 8px; }
    .dropzone-box p { color: #8b949e; font-size: 14px; }
    .right-panel { width: 260px; background: #161b22; border-left: 1px solid #30363d; overflow-y: auto; }
    .right-panel .sidebar-section { padding: 12px; }
    .angle-select { width: 100%; padding: 4px 8px; background: #21262d; border: 1px solid #30363d; color: #c9d1d9; border-radius: 4px; }
    .feature-item { display: flex; align-items: center; justify-content: space-between; padding: 4px 8px; font-size: 13px; border-radius: 4px; }
    .feature-item:hover { background: #21262d; }
    .feature-item .delete-btn { color: #f85149; cursor: pointer; background: none; border: none; font-size: 16px; }
    .dim-form { display: flex; flex-direction: column; gap: 6px; }
    .dim-form input { padding: 4px 8px; background: #21262d; border: 1px solid #30363d; color: #c9d1d9; border-radius: 4px; font-size: 13px; }
    .dim-form button { padding: 4px 8px; background: #238636; border: none; color: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .scale-info { font-size: 13px; color: #58a6ff; padding: 4px 0; }
    .action-btn { width: 100%; padding: 8px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; border-radius: 6px; cursor: pointer; font-size: 13px; margin-top: 4px; }
    .action-btn:hover { background: #30363d; }
    .action-btn.primary { background: #238636; border-color: #238636; color: #fff; }
    .action-btn.primary:hover { background: #2ea043; }
    .status-bar { padding: 4px 16px; background: #161b22; border-top: 1px solid #30363d; font-size: 12px; color: #8b949e; display: flex; gap: 16px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>照片量測工具</h1>
    <span class="project-name" id="projectName">尚無專案</span>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-section">
        <h3>照片</h3>
        <div class="photo-list" id="photoList"></div>
        <button type="button" class="action-btn" id="addPhotoBtn" style="margin-top:8px">+ 新增照片</button>
        <input type="file" id="fileInput" multiple accept="image/jpeg,image/png,image/webp" style="display:none" />
      </div>
    </div>

    <div style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
      <div class="toolbar">
        <button type="button" class="tool-btn active" data-tool="select">選取</button>
        <button type="button" class="tool-btn" data-tool="polyline">多邊形</button>
        <button type="button" class="tool-btn" data-tool="arc">弧線</button>
        <button type="button" class="tool-btn" data-tool="hole">圓孔</button>
        <div class="tool-sep"></div>
        <button type="button" class="tool-btn" data-tool="scale">比例尺</button>
        <div class="tool-sep"></div>
        <button type="button" class="tool-btn" id="undoBtn">復原</button>
        <button type="button" class="tool-btn" id="redoBtn">重做</button>
      </div>
      <div class="workspace" id="workspace">
        <canvas id="photoCanvas"></canvas>
        <canvas id="drawingCanvas"></canvas>
        <div class="dropzone" id="dropzone">
          <div class="dropzone-box" id="dropzoneBox">
            <h2>將照片拖曳至此處</h2>
            <p>或點擊瀏覽檔案（支援 JPEG、PNG、WebP）</p>
          </div>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="sidebar-section">
        <h3>拍攝角度</h3>
        <select class="angle-select" id="angleSelect" title="拍攝角度">
          <option value="top">俯視圖</option>
          <option value="side">側視圖</option>
          <option value="front">正視圖</option>
          <option value="back">背面圖</option>
          <option value="close-up">特寫</option>
        </select>
      </div>
      <div class="sidebar-section">
        <h3>比例尺</h3>
        <div class="scale-info" id="scaleInfo">尚未校準 — 請使用比例尺工具</div>
      </div>
      <div class="sidebar-section">
        <h3>標記特徵</h3>
        <div id="featureList"></div>
      </div>
      <div class="sidebar-section">
        <h3>手動尺寸</h3>
        <div id="dimensionList"></div>
        <div class="dim-form" style="margin-top:8px">
          <input type="text" id="dimLocation" placeholder="位置（例：厚度）" />
          <input type="number" id="dimValue" placeholder="數值（mm）" step="0.1" />
          <button type="button" class="dim-form button" id="addDimBtn" style="padding:4px 8px; background:#238636; border:none; color:#fff; border-radius:4px; cursor:pointer;">新增</button>
        </div>
      </div>
      <div class="sidebar-section">
        <h3>操作</h3>
        <button type="button" class="action-btn primary" id="analyzeBtn">AI 分析</button>
        <button type="button" class="action-btn" id="exportBtn">匯出 JSON</button>
        <button type="button" class="action-btn" id="copyJsonBtn">複製 JSON</button>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span id="statusCoords">-</span>
    <span id="statusScale">比例尺：-</span>
    <span id="statusTool">工具：選取</span>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
