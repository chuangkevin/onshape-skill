name: Deploy to Server via Tailscale

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: kevin950805
  DEPLOY_PATH: /home/kevin/DockerCompose/onshape-skill
  DEPLOY_SERVER: 100.79.242.43   # homedocker VM (Tailscale)
  DEPLOY_USER: kevin

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Test Tailscale Connection
        run: |
          echo "Testing connection to deployment server..."
          tailscale status
          ping -c 3 ${{ env.DEPLOY_SERVER }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DEPLOY_SERVER }} >> ~/.ssh/known_hosts

      - name: Sync docker-compose.yml to server
        run: |
          ssh -i ~/.ssh/deploy_key "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_SERVER }}" "mkdir -p ${{ env.DEPLOY_PATH }}"
          scp -i ~/.ssh/deploy_key tools/measure/docker-compose.yml "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_SERVER }}:${{ env.DEPLOY_PATH }}/docker-compose.yml"

      - name: Sync Caddyfile to server
        run: |
          scp -i ~/.ssh/deploy_key tools/measure/Caddyfile "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_SERVER }}:${{ env.DEPLOY_PATH }}/Caddyfile"

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_SERVER }} << 'ENDSSH'
            set -e
            DEPLOY_PATH="/home/kevin/DockerCompose/onshape-skill"

            retry_pull() {
              local max_attempts=3
              local attempt=1
              local delay=10
              while [ $attempt -le $max_attempts ]; do
                echo "Pulling Docker images (attempt $attempt/$max_attempts)..."
                if docker compose -f docker-compose.yml pull; then
                  echo "Pull successful!"
                  return 0
                fi
                if [ $attempt -lt $max_attempts ]; then
                  echo "Pull failed, retrying in ${delay}s..."
                  sleep $delay
                  delay=$((delay * 2))
                fi
                attempt=$((attempt + 1))
              done
              echo "Pull failed after $max_attempts attempts"
              return 1
            }

            echo "Navigating to deployment directory..."
            cd "${DEPLOY_PATH}"

            retry_pull

            echo "Stopping existing containers..."
            docker compose -f docker-compose.yml down --remove-orphans --timeout 30 || true

            echo "Waiting for port release..."
            for i in 1 2 3 4 5 6; do
              if ! ss -tlnp | grep -q ":6123 "; then
                echo "Port 6123 is free"
                break
              fi
              echo "Port 6123 still in use, waiting... ($i/6)"
              sleep 5
            done

            echo "Starting updated containers..."
            docker compose -f docker-compose.yml up -d --force-recreate

            echo "Reloading Caddy config..."
            if command -v caddy >/dev/null 2>&1; then
              caddy reload --config "${DEPLOY_PATH}/Caddyfile" || true
            elif docker ps --format "{{.Names}}" | grep -q caddy; then
              docker exec $(docker ps --filter "name=caddy" --format "{{.ID}}" | head -1) caddy reload --config /etc/caddy/Caddyfile || true
            else
              echo "Caddy not found, skipping reload"
            fi

            echo "Cleaning up old images..."
            docker image prune -af --filter "until=24h" || true

            echo "Deployment completed successfully!"
            docker compose -f docker-compose.yml ps
          ENDSSH

      - name: Health Check
        run: |
          echo "Performing health check..."
          sleep 10
          curl -f http://${{ env.DEPLOY_SERVER }}:6123/api/health || exit 1
          echo "Health check passed!"

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Server**: \`${{ env.DEPLOY_SERVER }}\` (homedocker VM)" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.DOCKERHUB_USERNAME }}/onshape-measure:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "- **Port**: 6123" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Notify on Failure
        if: failure()
        run: |
          echo "Deployment failed! Please check the logs above." >> $GITHUB_STEP_SUMMARY
